<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Postify</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; width: 340px; background: #f8f9fb; color: #1a1a2e; }
    .header { background: white; padding: 14px 16px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid #e5e7eb; }
    .logo { width: 32px; height: 32px; background: linear-gradient(135deg, #6366f1, #8b5cf6); border-radius: 8px; display: flex; align-items: center; justify-content: center; color: white; font-weight: 700; font-size: 16px; }
    .logo-text { font-size: 16px; font-weight: 600; color: #1a1a2e; }
    .logo-sub { font-size: 11px; color: #6b7280; }
    .body { padding: 14px; }
    .status-card { background: white; border-radius: 10px; padding: 12px 14px; margin-bottom: 12px; border: 1px solid #e5e7eb; }
    .status-row { display: flex; align-items: center; gap: 8px; font-size: 13px; }
    .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .dot-green { background: #22c55e; }
    .dot-gray { background: #9ca3af; }
    .dot-amber { animation: pulse 1s infinite; background: #f59e0b; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
    .vehicle-info { margin-top: 8px; padding-top: 8px; border-top: 1px solid #f3f4f6; }
    .vehicle-name { font-size: 13px; font-weight: 600; color: #1a1a2e; }
    .vehicle-meta { font-size: 12px; color: #6b7280; margin-top: 2px; }
    .btn { width: 100%; padding: 10px; border-radius: 8px; font-size: 13px; font-weight: 600; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px; transition: all 0.15s; margin-bottom: 8px; }
    .btn-primary { background: #6366f1; color: white; }
    .btn-primary:hover { background: #4f46e5; }
    .btn-primary:disabled { background: #c4b5fd; cursor: not-allowed; }
    .btn-secondary { background: white; color: #6366f1; border: 1.5px solid #6366f1; }
    .btn-fb { background: #1877f2; color: white; }
    .error { background: #fef2f2; border: 1px solid #fecaca; border-radius: 8px; padding: 10px 12px; font-size: 12px; color: #dc2626; margin-bottom: 8px; }
    .hint { font-size: 11px; color: #9ca3af; text-align: center; padding: 4px 0; }
    .open-btn { font-size: 12px; color: #6366f1; background: none; border: none; cursor: pointer; text-decoration: underline; width: 100%; text-align: center; padding: 4px; }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">P</div>
    <div>
      <div class="logo-text">Postify</div>
      <div class="logo-sub">AI Listing Generator</div>
    </div>
  </div>

  <div class="body">
    <div class="status-card">
      <div class="status-row">
        <div class="dot" id="status-dot"></div>
        <span id="status-text">Checking page...</span>
      </div>
      <div class="vehicle-info" id="vehicle-info" style="display:none">
        <div class="vehicle-name" id="v-name"></div>
        <div class="vehicle-meta" id="v-meta"></div>
      </div>
    </div>

    <div class="error" id="error-box" style="display:none"></div>

    <button class="btn btn-primary" id="generate-btn" onclick="openInPostify()">
      ✨ Generate Listing in Postify
    </button>

    <p class="hint" id="hint-text"></p>
  </div>

  <script src="popup.js"></script>
</body>
</html>
